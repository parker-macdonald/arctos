{% extends "base.html" %}

{% block title %}Edit {{ match.name }} - {{ tournament.name }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1>Edit Match: {{ match.name }}</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/{{ tournament.url }}">{{ tournament.name }}</a></li>
                <li class="breadcrumb-item"><a href="/{{ tournament.url }}/setup">Setup</a></li>
                <li class="breadcrumb-item active">Edit Match</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Match Details</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="/{{ tournament.url }}/update-match">
                    <input type="hidden" name="match_id" value="{{ match.uuid }}">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="match_name" class="form-label">Match Name</label>
                                <input type="text" class="form-control" id="match_name" name="match_name" value="{{ match.name }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="field" class="form-label">Field</label>
                                <select class="form-select" id="field" name="field">
                                    <option value="">Select Field</option>
                                    {% for field in fields %}
                                    <option value="{{ field.name }}" {% if match.field == field.name %}selected{% endif %}>{{ field.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="start_time" class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" id="start_time" name="start_time" 
                                       value="{{ match.nominal_start_time.strftime('%Y-%m-%dT%H:%M') if match.nominal_start_time else '' }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="length" class="form-label">Length (minutes)</label>
                                <input type="number" class="form-control" id="length" name="length" value="{{ match.nominal_length or 60 }}" min="1">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="dynamic" class="form-label">Scheduling</label>
                                <select class="form-select" id="dynamic" name="dynamic">
                                    <option value="true" {% if match.dynamic %}selected{% endif %}>Dynamic (can start early if previous match ends)</option>
                                    <option value="false" {% if not match.dynamic %}selected{% endif %}>Static (starts at scheduled time)</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="refs" class="form-label">Referees</label>
                                <input type="text" class="form-control autocomplete" id="refs" name="refs" 
                                       value="{{ match.refs_initial or '' }}" placeholder="Search teams, tags, or match results" data-multiple="true" autocomplete="off">
                                <div class="autocomplete-suggestions" id="refs-suggestions"></div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="team1" class="form-label">Team 1</label>
                                <input type="text" class="form-control autocomplete" id="team1" name="team1" 
                                       value="{{ match.team1_initial or '' }}" placeholder="Search teams, tags, or match results" data-multiple="false" autocomplete="off">
                                <div class="autocomplete-suggestions" id="team1-suggestions"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="team2" class="form-label">Team 2</label>
                                <input type="text" class="form-control autocomplete" id="team2" name="team2" 
                                       value="{{ match.team2_initial or '' }}" placeholder="Search teams, tags, or match results" data-multiple="false" autocomplete="off">
                                <div class="autocomplete-suggestions" id="team2-suggestions"></div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="match_type" class="form-label">Match Type</label>
                                <select class="form-select" id="match_type" name="match_type">
                                    <option value="SETS" {% if match.type == 'SETS' %}selected{% endif %}>Sets</option>
                                    <option value="STONES" {% if match.type == 'STONES' %}selected{% endif %}>Stones</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nsets" class="form-label">Number of Sets</label>
                                <input type="number" class="form-control" id="nsets" name="nsets" value="{{ match.nsets or 3 }}" min="1">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6" id="stones-per-set-field" style="display: none;">
                            <div class="mb-3">
                                <label for="nstonesperset" class="form-label">Stones per Set</label>
                                <input type="number" class="form-control" id="nstonesperset" name="nstonesperset" value="{{ match.nstonesperset or 100 }}" min="1" max="1000">
                                <div class="form-text">Number of stones available for each set</div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Update Match</button>
                        <a href="/{{ tournament.url }}/setup" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.autocomplete-suggestions {
    position: absolute;
    z-index: 1000;
    background: white;
    border: 1px solid #ccc;
    border-top: none;
    max-height: 200px;
    overflow-y: auto;
    width: 100%;
    display: none;
}

.autocomplete-suggestion {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.autocomplete-suggestion:hover,
.autocomplete-suggestion.active {
    background-color: #f8f9fa;
}

.autocomplete-suggestion .type {
    font-size: 0.8em;
    color: #666;
    margin-left: 8px;
}

.autocomplete-container {
    position: relative;
}
</style>

            <script>
            document.addEventListener('DOMContentLoaded', function() {
                const tournamentUrl = '{{ tournament.url }}';
                let debounceTimer;
                let cachedSuggestions = null;
    
    // Add autocomplete containers
    document.querySelectorAll('.autocomplete').forEach(input => {
        const container = document.createElement('div');
        container.className = 'autocomplete-container';
        input.parentNode.insertBefore(container, input);
        container.appendChild(input);
    });
    
    // Add event listeners to all autocomplete inputs
    document.querySelectorAll('.autocomplete').forEach(input => {
        input.addEventListener('input', function() {
            const fullValue = this.value.trim();
            const suggestionsId = this.id + '-suggestions';
            const suggestionsDiv = document.getElementById(suggestionsId);
            
            // Clear previous timer
            clearTimeout(debounceTimer);
            
            // For multiple fields, get the last part after the last comma
            let query = fullValue;
            if (input.dataset.multiple === 'true' && fullValue.includes(',')) {
                const parts = fullValue.split(',');
                query = parts[parts.length - 1].trim();
            }
            
            if (query.length < 2) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            // Debounce the search
            debounceTimer = setTimeout(() => {
                fetchSuggestions(query, suggestionsDiv, this);
            }, 300);
        });
        
                    input.addEventListener('blur', function() {
                        // Hide suggestions after a short delay to allow clicking
                        setTimeout(() => {
                            const suggestionsId = this.id + '-suggestions';
                            const suggestionsDiv = document.getElementById(suggestionsId);
                            suggestionsDiv.style.display = 'none';
                        }, 200);
                    });
                    
                    input.addEventListener('click', function() {
                        // Show suggestions when clicking on the input
                        const suggestionsId = this.id + '-suggestions';
                        const suggestionsDiv = document.getElementById(suggestionsId);
                        const currentValue = this.value.trim();
                        
                        // If there's content, search for suggestions
                        if (currentValue.length >= 2) {
                            const query = currentValue;
                            if (input.dataset.multiple === 'true' && currentValue.includes(',')) {
                                const parts = currentValue.split(',');
                                query = parts[parts.length - 1].trim();
                            }
                            
                            if (query.length >= 2) {
                                fetchSuggestions(query, suggestionsDiv, this);
                            }
                        }
                    });
        
        input.addEventListener('keydown', function(e) {
            const suggestionsId = this.id + '-suggestions';
            const suggestionsDiv = document.getElementById(suggestionsId);
            const activeSuggestion = suggestionsDiv.querySelector('.active');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (activeSuggestion) {
                    activeSuggestion.classList.remove('active');
                    const next = activeSuggestion.nextElementSibling;
                    if (next) next.classList.add('active');
                } else {
                    const first = suggestionsDiv.querySelector('.autocomplete-suggestion');
                    if (first) first.classList.add('active');
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (activeSuggestion) {
                    activeSuggestion.classList.remove('active');
                    const prev = activeSuggestion.previousElementSibling;
                    if (prev) prev.classList.add('active');
                }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (activeSuggestion) {
                    selectSuggestion(activeSuggestion, this);
                }
            } else if (e.key === 'Escape') {
                suggestionsDiv.style.display = 'none';
            }
        });
    });
    
                function fetchSuggestions(query, suggestionsDiv, input) {
                    // Use cached suggestions if available, otherwise fetch from server
                    if (cachedSuggestions) {
                        const filteredSuggestions = cachedSuggestions.filter(suggestion => 
                            suggestion.value.toLowerCase().includes(query.toLowerCase())
                        );
                        displaySuggestions(filteredSuggestions, suggestionsDiv, input);
                    } else {
                        fetch(`/${tournamentUrl}/api/autocomplete?q=${encodeURIComponent(query)}`)
                            .then(response => response.json())
                            .then(suggestions => {
                                displaySuggestions(suggestions, suggestionsDiv, input);
                            })
                            .catch(error => {
                                console.error('Error fetching suggestions:', error);
                                suggestionsDiv.style.display = 'none';
                            });
                    }
                }
                
                // Load all suggestions once on page load
                function loadAllSuggestions() {
                    fetch(`/${tournamentUrl}/api/autocomplete?q=`)
                        .then(response => response.json())
                        .then(suggestions => {
                            cachedSuggestions = suggestions;
                        })
                        .catch(error => {
                            console.error('Error loading suggestions:', error);
                        });
                }
                
                // Load suggestions on page load
                loadAllSuggestions();
    
    function displaySuggestions(suggestions, suggestionsDiv, input) {
        suggestionsDiv.innerHTML = '';
        
        if (suggestions.length === 0) {
            suggestionsDiv.style.display = 'none';
            return;
        }
        
        suggestions.forEach(suggestion => {
            const div = document.createElement('div');
            div.className = 'autocomplete-suggestion';
            div.innerHTML = `
                <span>${suggestion.label}</span>
                <span class="type">${suggestion.type}</span>
            `;
            // Store the actual value in a data attribute
            div.dataset.value = suggestion.value;
            div.addEventListener('click', () => selectSuggestion(div, input));
            suggestionsDiv.appendChild(div);
        });
        
        suggestionsDiv.style.display = 'block';
    }
    
    function selectSuggestion(suggestionElement, input) {
        // Get the actual value from the data attribute
        const value = suggestionElement.dataset.value;
        const isMultiple = input.dataset.multiple === 'true';
        
        if (isMultiple) {
            // For refs field, replace only the last part (after last comma)
            const currentValue = input.value.trim();
            if (currentValue && currentValue.includes(',')) {
                // Find the last comma and replace everything after it
                const lastCommaIndex = currentValue.lastIndexOf(',');
                input.value = currentValue.substring(0, lastCommaIndex + 1) + ' ' + value;
            } else if (currentValue) {
                // No comma yet, so replace the entire value
                input.value = value;
            } else {
                // Empty field, just set the value
                input.value = value;
            }
        } else {
            // For team fields, replace the value
            input.value = value;
        }
        
        // Hide suggestions
        const suggestionsId = input.id + '-suggestions';
        const suggestionsDiv = document.getElementById(suggestionsId);
        suggestionsDiv.style.display = 'none';
        
        // Focus back to input
        input.focus();
    }
});

// Handle match type change to show/hide stones field
document.getElementById('match_type').addEventListener('change', function() {
    const stonesField = document.getElementById('stones-per-set-field');
    if (this.value === 'STONES') {
        stonesField.style.display = 'block';
    } else {
        stonesField.style.display = 'none';
    }
});

// Initialize stones field visibility on page load
document.addEventListener('DOMContentLoaded', function() {
    const matchType = document.getElementById('match_type');
    const stonesField = document.getElementById('stones-per-set-field');
    if (matchType.value === 'STONES') {
        stonesField.style.display = 'block';
    }
});
</script>
{% endblock %}
