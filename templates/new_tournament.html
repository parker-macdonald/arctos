{% extends "base.html" %}

{% block title %}New Tournament - TO Site{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Create New Tournament</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('tournaments.create_tournament') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Tournament Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="url" class="form-label">URL Slug</label>
                        <input type="text" class="form-control" id="url" name="url" required>
                        <div class="form-text">This will be used in the URL (e.g., /my-tournament)</div>
                    </div>
                    
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Create Tournament</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
