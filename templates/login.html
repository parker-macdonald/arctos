{% extends "base.html" %}

{% block title %}Login - TO Site{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">Login as {{ user_type.title() }}</h3>
                    <div class="btn-group btn-group-sm" role="group">
                        <a href="{{ url_for('auth.login', type='player') }}" class="btn {% if user_type=='player' %}btn-primary{% else %}btn-outline-primary{% endif %}">Player</a>
                        <a href="{{ url_for('auth.login', type='team') }}" class="btn {% if user_type=='team' %}btn-primary{% else %}btn-outline-primary{% endif %}">Team</a>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="user_type" value="{{ user_type }}">
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
                
                <hr>
                <div class="text-center">
                    <p>Don't have an account? <a href="{{ url_for('auth.register', type=user_type) }}">Register here</a></p>
                    <p>Or login as a <a href="{{ url_for('auth.login', type='player' if user_type == 'team' else 'team') }}">{{ 'player' if user_type == 'team' else 'team' }}</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
