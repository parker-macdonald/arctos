{% extends "base.html" %}

{% block title %}Stones Player{% endblock %}

{% block content %}
<!-- MathJax for LaTeX rendering -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
};
</script>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1>Stones Player</h1>
            <div class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <button id="reset-btn" class="btn btn-danger mb-3">Reset Kalman Filter</button>
                    </div>
                    <div class="mb-3">
                        <h5>Stats</h5>
                        <p>$\hat{x}$ : <span id="estimated-offset">0.000</span> s</p>
                        <p>$P$ : <span id="covariance">1.000</span> s²</p>
                        <p>round trip time: <span id="rtt">-</span> ms</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Kalman Filter for time offset estimation
class KalmanFilter {
    constructor() {
        this.x = 0;  // State estimate (time offset)
        this.P = 1.0;  // Initial estimation error covariance (1 second squared)
        this.Q = 0.00001;  // Process noise covariance (clock drift)
        this.R = 0.05;   // Measurement noise covariance (~50ms std dev, accounts for network jitter)
    }
    
    update(measurement) {
        // Predict
        this.P = this.P + this.Q;
        
        // Update
        const K = this.P / (this.P + this.R);  // Kalman gain
        this.x = this.x + K * (measurement - this.x);
        this.P = (1 - K) * this.P;
        
        return this.x;
    }
    
    getState() {
        return this.x;
    }
    
    getCovariance() {
        return this.P;
    }
    
    reset() {
        this.x = 0;
        this.P = 1.0;
    }
    
    // Save state to object for persistence
    toJSON() {
        return {
            x: this.x,
            P: this.P
        };
    }
    
    // Load state from object
    fromJSON(data) {
        if (data && typeof data.x === 'number' && typeof data.P === 'number') {
            this.x = data.x;
            this.P = data.P;
        }
    }
}

// Global variables
let kalmanFilter = new KalmanFilter();
let isPlaying = false;
let nextBeatTime = null;
let scheduledTimeout = null;  // Track the current timeout to prevent duplicates
let audioContext = null;
let audioBuffer = null;  // Preloaded audio buffer for MP3
let syncInterval = null;
let scheduleInterval = null;  // Interval for scheduling beats ahead
const STORAGE_KEY = 'stones_player_kf_state';
const AUDIO_FILE = '{{ url_for("static", filename="stone.mp3") }}';
const SCHEDULE_AHEAD = 0.5;  // Schedule beats 0.5 seconds in advance
const LOOKAHEAD = 0.25;  // Check every 250ms for new beats to schedule

// Load Kalman filter state from localStorage
function loadKFState() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const state = JSON.parse(saved);
            kalmanFilter.fromJSON(state);
            console.log('Loaded KF state from localStorage:', state);
        }
    } catch (error) {
        console.error('Error loading KF state:', error);
    }
}

// Save Kalman filter state to localStorage
function saveKFState() {
    try {
        const state = kalmanFilter.toJSON();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (error) {
        console.error('Error saving KF state:', error);
    }
}

// Update display with current KF state
function updateDisplay() {
    const offset = kalmanFilter.getState();
    const covariance = kalmanFilter.getCovariance();
    
    document.getElementById('estimated-offset').textContent = offset.toFixed(6);
    document.getElementById('covariance').textContent = covariance.toFixed(6);
    
    // Trigger MathJax rendering after updating values
    if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise().catch((err) => console.error('MathJax error:', err));
    }
}

// Initialize audio context and load MP3 file
async function initAudio() {
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Load MP3 file into audio buffer
        const response = await fetch(AUDIO_FILE);
        const arrayBuffer = await response.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        console.log('Audio file loaded successfully');
    } catch (error) {
        console.error('Error initializing audio:', error);
        // Fallback: try using HTML5 Audio if Web Audio API fails
        console.warn('Falling back to HTML5 Audio');
    }
}

// Convert Unix timestamp to audio context time
function unixToAudioTime(unixTime) {
    if (!audioContext) {
        return 0;
    }
    const now = Date.now() / 1000;
    // Calculate the delay from now to the target Unix time
    const delayFromNow = unixTime - now;
    // Convert to audio context time (relative to current audio context time)
    return audioContext.currentTime + delayFromNow;
}

// Play the MP3 sound at a specific audio context time
function scheduleSoundAt(audioTime) {
    if (!audioContext || !audioBuffer) {
        console.error('Audio not initialized');
        return;
    }
    
    try {
        // Create a new buffer source for each play (required for multiple plays)
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        
        // Schedule to play at the precise audio context time
        // Ensure we schedule at least 0.01 seconds in the future
        const scheduleTime = Math.max(audioContext.currentTime + 0.01, audioTime);
        source.start(scheduleTime);
    } catch (error) {
        console.error('Error scheduling sound:', error);
    }
}

// Legacy playSound for immediate playback (fallback)
function playSound() {
    if (!audioContext || !audioBuffer) {
        console.error('Audio not initialized');
        return;
    }
    
    try {
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        source.start(audioContext.currentTime);
    } catch (error) {
        console.error('Error playing sound:', error);
    }
}

// Get server time and measure latency
async function syncWithServer() {
    const clientSendTime = Date.now() / 1000;
    
    try {
        // Add timeout to prevent hanging on network failures
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000); // 3 second timeout
        
        const response = await fetch('/server-time', { signal: controller.signal });
        clearTimeout(timeoutId);
        
        const clientReceiveTime = Date.now() / 1000;
        const data = await response.json();
        
        const serverTime = data.server_time;
        const rtt = (clientReceiveTime - clientSendTime) * 1000;
        const estimatedServerTime = serverTime + (rtt / 2000); // Half of RTT
        
        // Calculate offset: server time - client time
        const clientTime = clientSendTime + (rtt / 2000);
        const offset = estimatedServerTime - clientTime;
        
        // Update Kalman filter
        kalmanFilter.update(offset);
        
        // Save state to localStorage
        saveKFState();
        
        // Update display
        updateDisplay();
        document.getElementById('rtt').textContent = rtt.toFixed(1);
        
        return { offset: kalmanFilter.getState(), rtt };
    } catch (error) {
        // Network error or timeout - continue with last known offset
        // Don't update the filter or display, just log it
        console.warn('Sync failed (continuing with last offset):', error.name);
        
        // Show "offline" or "-" for RTT when sync fails
        const rttEl = document.getElementById('rtt');
        if (rttEl) {
            rttEl.textContent = error.name === 'AbortError' ? 'timeout' : 'error';
        }
        
        return null;
    }
}

// Track which beats have been scheduled to avoid duplicates
let scheduledBeats = new Set();

// Calculate next beat time based on unix timestamp (returns server time)
function calculateNextBeatServerTime() {
    const now = Date.now() / 1000;
    const beatInterval = 1.5;
    const estimatedOffset = kalmanFilter.getState();
    
    // Offset represents: server_time = client_time + offset
    // We want to play when server_time is a multiple of 1.5
    // Server time at now: serverNow = now + offset
    const serverNow = now + estimatedOffset;
    const nextBeatServer = Math.ceil(serverNow / beatInterval) * beatInterval;
    
    return nextBeatServer;
}

// Schedule beats using Web Audio API for precise timing (mobile-friendly)
function scheduleBeatsAhead() {
    if (!isPlaying || !audioContext || !audioBuffer) return;
    
    const now = Date.now() / 1000;
    const estimatedOffset = kalmanFilter.getState();
    const serverNow = now + estimatedOffset;
    
    // Look ahead for the next few beats that need to be scheduled
    const beatInterval = 1.5;
    const lookAheadServerTime = serverNow + SCHEDULE_AHEAD;
    
    // Find the next beat that needs scheduling
    let nextBeatServer = calculateNextBeatServerTime();
    
    // Schedule all beats within the look-ahead window
    while (nextBeatServer <= lookAheadServerTime + beatInterval) {
        // Check if this beat is already scheduled
        const beatKey = Math.round(nextBeatServer * 1000); // Use ms precision for key
        
        if (!scheduledBeats.has(beatKey)) {
            // Convert server time to client time
            const clientBeatTime = nextBeatServer - estimatedOffset;
            
            // Convert to audio context time
            const audioTime = unixToAudioTime(clientBeatTime);
            
            // Only schedule if it's in the future (with a small buffer)
            if (audioTime > audioContext.currentTime + 0.01) {
                scheduleSoundAt(audioTime);
                scheduledBeats.add(beatKey);
                
                // Clean up old scheduled beats (keep only recent ones)
                if (scheduledBeats.size > 100) {
                    // Remove beats that are more than 5 seconds old
                    const cutoff = Math.round((serverNow - 5) * 1000);
                    scheduledBeats = new Set([...scheduledBeats].filter(key => key > cutoff));
                }
            }
        }
        
        // Move to next beat
        nextBeatServer += beatInterval;
    }
    
    nextBeatTime = (calculateNextBeatServerTime() - estimatedOffset);
}

// Legacy function for compatibility (now uses look-ahead scheduling)
function scheduleNextBeat() {
    // This is now handled by scheduleBeatsAhead, but keeping for compatibility
    if (!isPlaying) return;
    scheduleBeatsAhead();
}

// Start playback (auto-starts)
function startPlayback() {
    if (!isPlaying) {
        isPlaying = true;
        scheduledBeats.clear(); // Reset scheduled beats
        
        // Clear any existing intervals/timeouts
        if (scheduledTimeout !== null) {
            clearTimeout(scheduledTimeout);
            scheduledTimeout = null;
        }
        if (scheduleInterval !== null) {
            clearInterval(scheduleInterval);
            scheduleInterval = null;
        }
        
        // Start look-ahead scheduling using Web Audio API timing
        scheduleBeatsAhead();
        scheduleInterval = setInterval(scheduleBeatsAhead, LOOKAHEAD * 1000);
    }
}

// Stop playback
function stopPlayback() {
    isPlaying = false;
    scheduledBeats.clear();
    
    if (scheduledTimeout !== null) {
        clearTimeout(scheduledTimeout);
        scheduledTimeout = null;
    }
    if (scheduleInterval !== null) {
        clearInterval(scheduleInterval);
        scheduleInterval = null;
    }
    
    nextBeatTime = null;
}

// Reset Kalman filter
function resetKF() {
    if (confirm('Reset Kalman filter state? This will clear the saved state and start fresh.')) {
        kalmanFilter.reset();
        saveKFState();
        updateDisplay();
        // Clear scheduled beats and reschedule with new offset
        if (isPlaying) {
            scheduledBeats.clear();
            scheduleBeatsAhead();
        }
    }
}

// Event listeners
document.addEventListener('DOMContentLoaded', async function() {
    // Load saved KF state
    loadKFState();
    updateDisplay();
    
    // Load audio file before user interaction
    await initAudio();
    
    // User interaction required for audio context (browser policy)
    const startAudio = async () => {
        if (audioContext && audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        // Ensure audio buffer is loaded before playing
        if (!audioBuffer && audioContext) {
            await initAudio();
        }
    };
    
    // Helper to start audio and playback on user interaction
    let playbackStarted = false;
    const ensurePlayback = async function() {
        await startAudio();
        if (!isPlaying && !playbackStarted) {
            playbackStarted = true;
            startPlayback();
        }
    };
    
    // Reset button - also starts playback if needed
    document.getElementById('reset-btn').addEventListener('click', async function() {
        await ensurePlayback();
        resetKF();
    });
    
    // Auto-start playback after user interaction (click anywhere on page)
    // Remove the listener after first successful start to avoid duplicate starts
    const startOnce = async function(e) {
        // Don't start if clicking the reset button (it handles it separately)
        if (e.target && e.target.id === 'reset-btn') {
            return;
        }
        await ensurePlayback();
        
        // Remove listener after starting to prevent duplicate starts
        if (playbackStarted) {
            document.removeEventListener('click', startOnce);
            const card = document.querySelector('.card');
            if (card) {
                card.removeEventListener('click', startOnce);
            }
        }
    };
    
    // Listen for clicks on the document (anywhere on page)
    document.addEventListener('click', startOnce);
    
    // Also listen on the card specifically
    const card = document.querySelector('.card');
    if (card) {
        card.addEventListener('click', startOnce);
    }
    
    // Sync with server periodically (every 1 second for better accuracy)
    syncInterval = setInterval(syncWithServer, 1000);
    
    // Initial sync
    await syncWithServer();
    
    // Update display periodically
    setInterval(updateDisplay, 100);
});
</script>
{% endblock %}
