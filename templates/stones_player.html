{% extends "base.html" %}

{% block title %}Stones Player{% endblock %}

{% block content %}
<!-- MathJax for LaTeX rendering -->
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
};
</script>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1>Stones Player</h1>
            <p>Usage Notes: On mobile, the browser must be open and on this page in order for the audio to play properly. </p>
            <div class="card">
                <div class="card-body">
                    <!-- Sound selector slider -->
                    <div class="mb-4">
                        <label class="form-label mb-2">Sound:</label>
                        <div class="btn-group w-100" role="group" id="audio-selector">
                            <input type="radio" class="btn-check" name="audio-type" id="audio-classic" value="classic" autocomplete="off" checked>
                            <label class="btn btn-outline-primary" for="audio-classic">Classic</label>
                            
                            <input type="radio" class="btn-check" name="audio-type" id="audio-snare" value="snare" autocomplete="off">
                            <label class="btn btn-outline-primary" for="audio-snare">Snare</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <button id="play-pause-btn" class="btn btn-primary btn-lg mb-3">Play</button>
                        <button id="reset-btn" class="btn btn-danger mb-3 ms-2">Reset Kalman Filter</button>
                    </div>
                    <!-- Hidden audio element for MediaStreamDestination (allows background playback on mobile) -->
                    <audio id="audio-stream" autoplay></audio>
                    <div class="mb-3">
                        <h5>Stats</h5>
                        <p>$\hat{x}$ : <span id="estimated-offset">0.000</span> s</p>
                        <p>$P$ : <span id="covariance">1.000</span> s²</p>
                        <p>round trip time: <span id="rtt">-</span> ms</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Kalman Filter for time offset estimation
class KalmanFilter {
    constructor() {
        this.x = 0;  // State estimate (time offset)
        this.P = 1.0;  // Initial estimation error covariance (1 second squared)
        this.Q = 0.00001;  // Process noise covariance (clock drift)
        this.R = 0.05;   // Measurement noise covariance (~50ms std dev, accounts for network jitter)
    }
    
    update(measurement) {
        // Predict
        this.P = this.P + this.Q;
        
        // Update
        const K = this.P / (this.P + this.R);  // Kalman gain
        this.x = this.x + K * (measurement - this.x);
        this.P = (1 - K) * this.P;
        
        return this.x;
    }
    
    getState() {
        return this.x;
    }
    
    getCovariance() {
        return this.P;
    }
    
    reset() {
        this.x = 0;
        this.P = 1.0;
    }
    
    // Save state to object for persistence
    toJSON() {
        return {
            x: this.x,
            P: this.P
        };
    }
    
    // Load state from object
    fromJSON(data) {
        if (data && typeof data.x === 'number' && typeof data.P === 'number') {
            this.x = data.x;
            this.P = data.P;
        }
    }
}

// Global variables
let kalmanFilter = new KalmanFilter();
let isPlaying = false;
let nextBeatTime = null;
let scheduledTimeout = null;  // Track the current timeout to prevent duplicates
let audioContext = null;
let audioBuffer = null;  // Preloaded audio buffer for MP3
let mediaStreamDestination = null;  // MediaStreamDestination for background playback on mobile
let syncInterval = null;
let wakeLock = null;  // Screen wake lock to prevent device sleep
const STORAGE_KEY = 'stones_player_kf_state';
const AUDIO_SELECT_KEY = 'stones_player_audio_select';

// Get audio file path based on selection
function getAudioFile() {
    const classicRadio = document.getElementById('audio-classic');
    const snareRadio = document.getElementById('audio-snare');
    const selected = snareRadio && snareRadio.checked ? 'snare' : 'classic';
    const filename = selected === 'snare' ? 'snare_stone.mp3' : 'classic_stone.mp3';
    return '{{ url_for("static", filename="") }}' + filename;
}

// Load Kalman filter state from localStorage
function loadKFState() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const state = JSON.parse(saved);
            kalmanFilter.fromJSON(state);
            console.log('Loaded KF state from localStorage:', state);
        }
    } catch (error) {
        console.error('Error loading KF state:', error);
    }
}

// Save Kalman filter state to localStorage
function saveKFState() {
    try {
        const state = kalmanFilter.toJSON();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (error) {
        console.error('Error saving KF state:', error);
    }
}

// Load audio selection from localStorage
function loadAudioSelection() {
    try {
        const saved = localStorage.getItem(AUDIO_SELECT_KEY);
        if (saved && (saved === 'classic' || saved === 'snare')) {
            const classicRadio = document.getElementById('audio-classic');
            const snareRadio = document.getElementById('audio-snare');
            if (saved === 'snare' && snareRadio) {
                snareRadio.checked = true;
            } else if (classicRadio) {
                classicRadio.checked = true;
            }
        }
    } catch (error) {
        console.error('Error loading audio selection:', error);
    }
}

// Save audio selection to localStorage
function saveAudioSelection() {
    try {
        const classicRadio = document.getElementById('audio-classic');
        const snareRadio = document.getElementById('audio-snare');
        const selected = snareRadio && snareRadio.checked ? 'snare' : 'classic';
        localStorage.setItem(AUDIO_SELECT_KEY, selected);
    } catch (error) {
        console.error('Error saving audio selection:', error);
    }
}

// Update display with current KF state (without expensive MathJax re-rendering)
let lastOffset = null;
let lastCovariance = null;

function updateDisplay(skipMathJax = true) {
    const offset = kalmanFilter.getState();
    const covariance = kalmanFilter.getCovariance();
    
    // Only update if values changed (avoid unnecessary DOM updates)
    if (offset !== lastOffset) {
        const offsetEl = document.getElementById('estimated-offset');
        if (offsetEl) {
            offsetEl.textContent = offset.toFixed(6);
        }
        lastOffset = offset;
    }
    
    if (covariance !== lastCovariance) {
        const covEl = document.getElementById('covariance');
        if (covEl) {
            covEl.textContent = covariance.toFixed(6);
        }
        lastCovariance = covariance;
    }
    
    // Only trigger MathJax rendering if explicitly requested (not on every update)
    if (!skipMathJax && window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise().catch((err) => console.error('MathJax error:', err));
    }
}

// Initialize audio context and load MP3 file
async function initAudio() {
    try {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Create MediaStreamDestination for background playback on mobile
        // This tricks Safari into thinking it's a live stream
        if (!mediaStreamDestination) {
            mediaStreamDestination = audioContext.createMediaStreamDestination();
            
            // Connect to audio element via srcObject
            const audioElement = document.getElementById('audio-stream');
            if (audioElement) {
                audioElement.srcObject = mediaStreamDestination.stream;
                // Ensure audio element is ready (muted initially to avoid issues)
                audioElement.volume = 1.0;
                console.log('MediaStreamDestination connected to audio element');
            }
        }
        
        // Load MP3 file into audio buffer
        const audioFile = getAudioFile();
        const response = await fetch(audioFile);
        const arrayBuffer = await response.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        console.log('Audio file loaded successfully:', audioFile);
    } catch (error) {
        console.error('Error initializing audio:', error);
    }
}

// Play the MP3 sound
function playSound() {
    if (!audioContext || !audioBuffer || !mediaStreamDestination) {
        console.error('Audio not initialized');
        return;
    }
    
    try {
        // Ensure audio element is playing (mobile browsers may pause it)
        const audioElement = document.getElementById('audio-stream');
        if (audioElement && audioElement.paused) {
            audioElement.play().catch(err => console.error('Error resuming audio element:', err));
        }
        
        // Create a new buffer source for each play (required for multiple plays)
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        // Connect to MediaStreamDestination instead of audioContext.destination
        // This allows background playback on mobile devices
        source.connect(mediaStreamDestination);
        
        // Play immediately at current time
        source.start(0);
    } catch (error) {
        console.error('Error playing sound:', error);
    }
}

// Get server time and measure latency
async function syncWithServer() {
    const clientSendTime = Date.now() / 1000;
    
    try {
        const response = await fetch('/server-time');
        const clientReceiveTime = Date.now() / 1000;
        const data = await response.json();
        
        const serverTime = data.server_time;
        const rtt = (clientReceiveTime - clientSendTime) * 1000;
        const estimatedServerTime = serverTime + (rtt / 2000); // Half of RTT
        
        // Calculate offset: server time - client time
        const clientTime = clientSendTime + (rtt / 2000);
        const offset = estimatedServerTime - clientTime;
        
        // Update Kalman filter
        kalmanFilter.update(offset);
        
        // Save state to localStorage
        saveKFState();
        
        // Update display (skip MathJax on sync updates for performance)
        updateDisplay(true);
        const rttEl = document.getElementById('rtt');
        if (rttEl) {
            rttEl.textContent = rtt.toFixed(1);
        }
        
        return { offset: kalmanFilter.getState(), rtt };
    } catch (error) {
        console.error('Error syncing with server:', error);
        return null;
    }
}

// Calculate next beat time based on unix timestamp
function calculateNextBeat() {
    const now = Date.now() / 1000;
    const beatInterval = 1.5;
    const estimatedOffset = kalmanFilter.getState();
    
    // Offset represents: server_time = client_time + offset
    // We want to play when server_time is a multiple of 1.5
    // Server time at now: serverNow = now + offset
    // Next server beat: ceil(serverNow / beatInterval) * beatInterval
    // Client time for that beat: nextBeatServer - offset
    const serverNow = now + estimatedOffset;
    const nextBeatServer = Math.ceil(serverNow / beatInterval) * beatInterval;
    const nextBeat = nextBeatServer - estimatedOffset;
    
    return nextBeat;
}

// Play sound at the next beat
function scheduleNextBeat() {
    if (!isPlaying) return;
    
    // Cancel any existing scheduled beat to prevent duplicates
    if (scheduledTimeout !== null) {
        clearTimeout(scheduledTimeout);
        scheduledTimeout = null;
    }
    
    const nextBeat = calculateNextBeat();
    const now = Date.now() / 1000;
    let delay = (nextBeat - now) * 1000;
    
    // If we're too close to or past the beat, skip to the next one (1.5 seconds later)
    // Use a minimum delay to ensure proper timing and avoid scheduling conflicts
    const MIN_DELAY = 10; // Minimum 10ms delay for scheduling
    let actualNextBeat = nextBeat;
    if (delay < MIN_DELAY) {
        // Skip to the beat 1.5 seconds after this one
        actualNextBeat = nextBeat + 1.5;
        delay = Math.max(MIN_DELAY, (actualNextBeat - now) * 1000);
    }
    
    nextBeatTime = actualNextBeat;
    
    scheduledTimeout = setTimeout(() => {
        scheduledTimeout = null;  // Clear the timeout reference
        if (isPlaying) {
            playSound();
            scheduleNextBeat(); // Schedule the next one
        }
    }, delay);
}

// Update play/pause button state
function updatePlayButton() {
    const btn = document.getElementById('play-pause-btn');
    if (btn) {
        if (isPlaying) {
            btn.textContent = 'Pause';
            btn.className = 'btn btn-warning btn-lg mb-3';
        } else {
            btn.textContent = 'Play';
            btn.className = 'btn btn-primary btn-lg mb-3';
        }
    }
}

// Request wake lock to prevent device sleep
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            // If we already have a wake lock, don't request another
            if (wakeLock) {
                return;
            }
            
            wakeLock = await navigator.wakeLock.request('screen');
            console.log('Wake lock acquired');
            
            // Handle wake lock release (e.g., browser releases it automatically)
            wakeLock.addEventListener('release', async () => {
                console.log('Wake lock released by browser');
                wakeLock = null;
                
                // If we're still playing and page is visible, try to re-acquire
                if (isPlaying && document.visibilityState === 'visible') {
                    console.log('Attempting to re-acquire wake lock...');
                    await requestWakeLock();
                }
            });
        }
    } catch (error) {
        // Wake lock may fail if:
        // - Already active
        // - Browser doesn't support it
        // - Page is not visible
        // This is fine, we'll just continue without it
        console.log('Wake lock not available:', error.message);
    }
}

// Release wake lock
async function releaseWakeLock() {
    try {
        if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
            console.log('Wake lock released');
        }
    } catch (error) {
        console.error('Error releasing wake lock:', error);
    }
}

// Start playback
async function startPlayback() {
    if (!isPlaying) {
        isPlaying = true;
        // Ensure audio context is ready
        if (audioContext && audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        // Ensure audio buffer is loaded
        if (!audioBuffer && audioContext) {
            await initAudio();
        }
        // Explicitly play the audio element (required for mobile browsers)
        const audioElement = document.getElementById('audio-stream');
        if (audioElement) {
            try {
                await audioElement.play();
            } catch (error) {
                console.error('Error playing audio element:', error);
            }
        }
        // Request wake lock to prevent device sleep (non-blocking)
        requestWakeLock().catch(err => {
            console.log('Wake lock request failed (non-critical):', err);
        });
        // Clear any existing timeout before starting
        if (scheduledTimeout !== null) {
            clearTimeout(scheduledTimeout);
            scheduledTimeout = null;
        }
        scheduleNextBeat();
        updatePlayButton();
    }
}

// Stop playback
function stopPlayback() {
    isPlaying = false;
    if (scheduledTimeout !== null) {
        clearTimeout(scheduledTimeout);
        scheduledTimeout = null;
    }
    nextBeatTime = null;
    // Release wake lock when stopping playback (non-blocking)
    releaseWakeLock().catch(err => {
        console.log('Wake lock release failed (non-critical):', err);
    });
    updatePlayButton();
}

// Reset Kalman filter
function resetKF() {
    if (confirm('Reset Kalman filter state? This will clear the saved state and start fresh.')) {
        kalmanFilter.reset();
        saveKFState();
        updateDisplay(false); // Trigger MathJax after reset
        // Reschedule beat with new offset
        if (isPlaying) {
            scheduleNextBeat();
        }
    }
}

// Event listeners
document.addEventListener('DOMContentLoaded', async function() {
    // Load saved KF state
    loadKFState();
    
    // Load saved audio selection
    loadAudioSelection();
    
    // Wait for MathJax to load, then update display once
    if (window.MathJax && window.MathJax.startup) {
        window.MathJax.startup.promise.then(() => {
            updateDisplay(false); // Initial render with MathJax
        });
    } else {
        // Fallback if MathJax not loaded yet
        updateDisplay(false);
    }
    
    // Initialize button state
    updatePlayButton();
    
    // Load audio file before user interaction
    await initAudio();
    
    // Audio selection change handler (for radio buttons)
    const classicRadio = document.getElementById('audio-classic');
    const snareRadio = document.getElementById('audio-snare');
    const handleAudioChange = async function() {
        saveAudioSelection();
        // Reload audio buffer with new file
        audioBuffer = null;
        await initAudio();
        // If playing, reschedule with new audio
        if (isPlaying) {
            scheduleNextBeat();
        }
    };
    if (classicRadio) {
        classicRadio.addEventListener('change', handleAudioChange);
    }
    if (snareRadio) {
        snareRadio.addEventListener('change', handleAudioChange);
    }
    
    // User interaction required for audio context (browser policy)
    const startAudio = async () => {
        if (audioContext && audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        // Ensure audio buffer is loaded before playing
        if (!audioBuffer && audioContext) {
            await initAudio();
        }
    };
    
    // Play/Pause button handler
    document.getElementById('play-pause-btn').addEventListener('click', async function() {
        await startAudio(); // Ensure audio context is ready
        
        if (isPlaying) {
            stopPlayback();
        } else {
            await startPlayback();
        }
    });
    
    // Reset button handler
    document.getElementById('reset-btn').addEventListener('click', async function() {
        resetKF();
    });
    
    // Sync with server periodically (every 1 second for better accuracy)
    syncInterval = setInterval(syncWithServer, 1000);
    
    // Initial sync
    await syncWithServer();
    
    // Update display periodically (throttled for mobile performance)
    // Use requestAnimationFrame for better performance and throttle to ~500ms
    let lastUpdateTime = 0;
    const updateThrottle = 500; // Update at most every 500ms
    
    function throttledUpdate() {
        const now = Date.now();
        if (now - lastUpdateTime >= updateThrottle) {
            updateDisplay(true); // Skip MathJax for frequent updates
            lastUpdateTime = now;
        }
        if (isPlaying) {
            requestAnimationFrame(throttledUpdate);
        }
    }
    
    // Start throttled updates
    requestAnimationFrame(throttledUpdate);
    
    // Handle visibility changes - re-request wake lock when page becomes visible again
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && isPlaying) {
            // Wake lock may have been released when page went to background
            // Re-request it if we're still playing (non-blocking)
            requestWakeLock().catch(err => {
                console.log('Wake lock re-request failed (non-critical):', err);
            });
        }
    });
    
    // Release wake lock when page unloads (non-blocking)
    window.addEventListener('beforeunload', () => {
        releaseWakeLock().catch(() => {});
    });
    
    // Also handle pagehide for better mobile browser support (non-blocking)
    window.addEventListener('pagehide', () => {
        releaseWakeLock().catch(() => {});
    });
});
</script>
{% endblock %}
