{% extends "base.html" %}

{% block title %}Choose Account Type - TO Site{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Choose Account Type</h3>
            </div>
            <div class="card-body">
                <p class="text-muted">You're signing in with Google as <strong>{{ email }}</strong>. Please choose whether you'd like to create a Player or Team account.</p>
                
                <form method="POST">
                    <div class="mb-3">
                        <div class="btn-group-vertical w-100" role="group">
                            <input type="radio" class="btn-check" name="user_type" id="user_type_player" value="player" autocomplete="off" checked>
                            <label class="btn btn-outline-primary btn-lg" for="user_type_player">
                                <strong>Player</strong><br>
                                <small>For individual players</small>
                            </label>
                            
                            <input type="radio" class="btn-check" name="user_type" id="user_type_team" value="team" autocomplete="off">
                            <label class="btn btn-outline-primary btn-lg" for="user_type_team">
                                <strong>Team</strong><br>
                                <small>For teams/organizations</small>
                            </label>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Continue</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
